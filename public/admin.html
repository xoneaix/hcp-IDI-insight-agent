<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MedVoice Insight｜Access 管理</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"><link rel="stylesheet" href="auth.css"></head>
<body><main class="admin-shell"><header class="admin-top"><div><div class="eyebrow">ACCESS ADMINISTRATION</div><h1>Portal 访问权限</h1><p id="adminIdentity"></p></div><div class="admin-actions"><a class="secondary" href="/" style="text-decoration:none">返回工作台</a><button class="secondary" id="logoutButton">退出登录</button></div></header>
<div class="admin-grid"><section class="panel"><h2>直接开通账号</h2><p>仅支持 @hisunpharm.com。系统会生成一次性临时密码。</p><form class="auth-form" id="addUserForm"><label class="field"><span>公司邮箱</span><input id="newUserEmail" type="email" placeholder="name@hisunpharm.com" required></label><label class="field"><span>权限角色</span><select id="newUserRole"><option value="user">普通试用用户</option><option value="admin">管理员</option></select></label><button class="primary" type="submit">开通访问</button></form><div class="credential-box" id="credentialBox" hidden><strong>临时登录凭据</strong><p>密码仅在本次操作后显示，请通过公司内部安全渠道发送给同事。</p><code id="credentialText"></code><div class="copy-row"><button class="secondary" id="copyCredential">复制凭据</button></div></div><div class="message" id="adminMessage"></div></section>
<section class="panel"><h2>待审批申请</h2><p>同事从登录页提交的试用申请。</p><div class="table-wrap"><table><thead><tr><th>邮箱</th><th>说明</th><th>申请时间</th><th>操作</th></tr></thead><tbody id="requestRows"></tbody></table></div></section>
<section class="panel wide"><h2>已开通用户</h2><p>可停用账号或重新生成临时密码。</p><div class="table-wrap"><table><thead><tr><th>邮箱</th><th>角色</th><th>状态</th><th>首次改密</th><th>最后登录</th><th>操作</th></tr></thead><tbody id="userRows"></tbody></table></div></section></div></main><script type="module" src="admin.js"></script></body></html>
