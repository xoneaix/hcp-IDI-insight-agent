<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MedVoice Insight｜登录</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"><link rel="stylesheet" href="auth.css"></head>
<body><div class="auth-shell">
  <section class="auth-brand"><div class="brand-row"><span class="brand-mark">M</span><span><strong>MedVoice</strong><small>INSIGHT AGENT</small></span></div><div class="brand-copy"><h1>听见每一种声音，<br><span>看见真正的需求。</span></h1><p>让访谈不止被记录，更被理解；让洞察有证据，让决策有依据。仅向获得内部授权的海正药业同事开放。</p></div><div class="brand-foot">HISUN PHARMA · INTERNAL RESEARCH USE</div></section>
  <main class="auth-main"><article class="auth-card"><div class="eyebrow">SECURE ACCESS PORTAL</div><h2 id="cardTitle">登录工作台</h2><p id="cardDescription">使用管理员开通的公司邮箱和密码登录。</p>
    <div class="tabs" id="authTabs"><button class="active" data-tab="login">账号登录</button><button data-tab="request">申请试用</button></div>
    <form class="auth-form" id="loginForm"><label class="field"><span>公司邮箱</span><input id="loginEmail" type="email" autocomplete="username" placeholder="name@hisunpharm.com" required></label><label class="field"><span>密码</span><input id="loginPassword" type="password" autocomplete="current-password" required></label><button class="primary" type="submit">安全登录</button></form>
    <form class="auth-form" id="requestForm" hidden><label class="field"><span>公司邮箱</span><input id="requestEmail" type="email" placeholder="name@hisunpharm.com" required></label><label class="field"><span>试用说明（可选）</span><textarea id="requestNote" placeholder="例如：市场部患者访谈项目验证"></textarea></label><div class="password-note">管理员批准后，账号与一次性临时密码将自动发送至你的公司邮箱。请同时检查收件箱和垃圾邮件。</div><button class="primary" type="submit">提交试用申请</button></form>
    <form class="auth-form" id="changePasswordForm" hidden><div class="password-note">这是临时密码首次登录。请设置至少12位的新密码，建议同时包含大小写字母、数字和符号。</div><label class="field"><span>当前临时密码</span><input id="currentPassword" type="password" required></label><label class="field"><span>新密码</span><input id="newPassword" type="password" minlength="12" required></label><label class="field"><span>确认新密码</span><input id="confirmPassword" type="password" minlength="12" required></label><button class="primary" type="submit">更新密码并进入</button></form>
    <div class="message" id="authMessage" role="status"></div>
  </article></main>
</div><script type="module" src="login.js"></script></body></html>
